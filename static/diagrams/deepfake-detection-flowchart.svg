<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1920" viewBox="0 0 1000 1920" role="img" aria-labelledby="title desc">
  <title id="title">Deepfake Detection Portal Flow Chart</title>
  <desc id="desc">Flow chart for the deepfake detection portal showing upload, validation, image and video analysis, threshold decision, reporting, and result display.</desc>
  <defs>
    <linearGradient id="nodeFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef5ff" />
      <stop offset="100%" stop-color="#d8e8ff" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4d7fb3" />
    </marker>
    <style>
      .bg {
        fill: #ffffff;
      }
      .node {
        fill: url(#nodeFill);
        stroke: #5d89b9;
        stroke-width: 2.2;
      }
      .text {
        font-family: Arial, sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #1d2e44;
        text-anchor: middle;
      }
      .small {
        font-family: Arial, sans-serif;
        font-size: 18px;
        font-weight: 400;
        fill: #1d2e44;
        text-anchor: middle;
      }
      .tiny {
        font-family: Arial, sans-serif;
        font-size: 17px;
        font-weight: 700;
        fill: #1d2e44;
      }
      .line {
        fill: none;
        stroke: #4d7fb3;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .label {
        font-family: Arial, sans-serif;
        font-size: 18px;
        font-weight: 700;
        fill: #1d2e44;
      }
      .caption {
        font-family: Cambria, Georgia, serif;
        font-size: 22px;
        fill: #111111;
        text-anchor: middle;
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1000" height="1920" />

  <rect class="node" x="390" y="20" width="220" height="64" rx="30" ry="30" />
  <text class="text" x="500" y="60">Start</text>

  <path class="line" d="M 500 84 L 500 130" />

  <polygon class="node" points="370,130 630,130 600,195 340,195" />
  <text class="text" x="485" y="163">Upload Image / Video</text>
  <text class="small" x="485" y="186">from browser</text>

  <path class="line" d="M 485 195 L 485 245" />

  <rect class="node" x="330" y="245" width="310" height="92" />
  <text class="text" x="485" y="283">Validate and Store File</text>
  <text class="small" x="485" y="309">name, type, upload path</text>

  <path class="line" d="M 485 337 L 485 385" />

  <polygon class="node" points="485,385 575,460 485,535 395,460" />
  <text class="text" x="485" y="452">Is File</text>
  <text class="small" x="485" y="478">Supported?</text>

  <text class="label" x="372" y="448">No</text>
  <path class="line" d="M 395 460 L 210 460 L 210 560" />

  <rect class="node" x="90" y="560" width="240" height="88" />
  <text class="text" x="210" y="598">Show Error</text>
  <text class="small" x="210" y="624">unsupported file</text>

  <text class="label" x="520" y="370">Yes</text>
  <path class="line" d="M 485 535 L 485 585" />

  <polygon class="node" points="485,585 585,655 485,725 385,655" />
  <text class="text" x="485" y="648">Is Media</text>
  <text class="small" x="485" y="674">Video?</text>

  <text class="label" x="600" y="640">Yes</text>
  <path class="line" d="M 585 655 L 760 655 L 760 760" />

  <rect class="node" x="620" y="760" width="280" height="98" />
  <text class="text" x="760" y="798">Sample Video Frames</text>
  <text class="small" x="760" y="824">read frames by stride</text>

  <path class="line" d="M 760 858 L 760 910" />

  <rect class="node" x="600" y="910" width="320" height="114" />
  <text class="text" x="760" y="950">Score and Aggregate</text>
  <text class="small" x="760" y="978">frame score, face score,</text>
  <text class="small" x="760" y="1002">video threshold</text>

  <text class="label" x="360" y="640">No</text>
  <path class="line" d="M 385 655 L 220 655 L 220 760" />

  <rect class="node" x="90" y="760" width="260" height="98" />
  <text class="text" x="220" y="798">Read Image</text>
  <text class="small" x="220" y="824">load uploaded frame</text>

  <path class="line" d="M 220 858 L 220 910" />

  <rect class="node" x="70" y="910" width="300" height="114" />
  <text class="text" x="220" y="950">Image Analysis</text>
  <text class="small" x="220" y="978">whole-image score, face score,</text>
  <text class="small" x="220" y="1002">blend and heuristics</text>

  <path class="line" d="M 220 1024 L 220 1110 L 500 1110 L 500 1150" />
  <path class="line" d="M 760 1024 L 760 1110 L 500 1110 L 500 1150" />

  <polygon class="node" points="500,1150 615,1235 500,1320 385,1235" />
  <text class="text" x="500" y="1226">Score &gt;=</text>
  <text class="small" x="500" y="1252">Threshold?</text>

  <text class="label" x="330" y="1220">Yes</text>
  <path class="line" d="M 385 1235 L 220 1235 L 220 1320" />

  <rect class="node" x="95" y="1320" width="250" height="88" />
  <text class="text" x="220" y="1360">Mark as FAKE</text>
  <text class="small" x="220" y="1385">high manipulation risk</text>

  <text class="label" x="640" y="1220">No</text>
  <path class="line" d="M 615 1235 L 780 1235 L 780 1320" />

  <rect class="node" x="655" y="1320" width="250" height="88" />
  <text class="text" x="780" y="1360">Mark as REAL</text>
  <text class="small" x="780" y="1385">no strong fake signal</text>

  <path class="line" d="M 220 1408 L 220 1460 L 500 1460 L 500 1510" />
  <path class="line" d="M 780 1408 L 780 1460 L 500 1460 L 500 1510" />

  <rect class="node" x="330" y="1510" width="340" height="96" />
  <text class="text" x="500" y="1549">Create Report and Result</text>
  <text class="small" x="500" y="1575">JSON report, chart, key frames</text>

  <path class="line" d="M 500 1606 L 500 1650" />

  <rect class="node" x="330" y="1650" width="340" height="96" />
  <text class="text" x="500" y="1689">Display Dashboard</text>
  <text class="small" x="500" y="1715">preview, verdict, download</text>

  <path class="line" d="M 500 1746 L 500 1790" />

  <rect class="node" x="390" y="1790" width="220" height="64" rx="30" ry="30" />
  <text class="text" x="500" y="1830">Stop</text>

  <text class="caption" x="500" y="1895">Fig.5.2 Flow chart of Deepfake Detection Portal</text>
</svg>
