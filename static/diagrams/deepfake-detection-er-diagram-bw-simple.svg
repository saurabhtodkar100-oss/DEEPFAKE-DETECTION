<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Deepfake Detection Portal ER Diagram</title>
  <desc id="desc">Simple black and white ER diagram for the Deepfake Detection Portal showing the main entities and relationships.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .entity { fill: #ffffff; stroke: #111111; stroke-width: 2.4; }
      .divider { stroke: #111111; stroke-width: 2; }
      .name { font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #111111; text-anchor: middle; }
      .attr { font-family: Arial, sans-serif; font-size: 18px; fill: #111111; }
      .rel { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #111111; text-anchor: middle; }
      .card { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #111111; text-anchor: middle; }
      .line { fill: none; stroke: #111111; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .title { font-family: Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #111111; text-anchor: middle; }
      .caption { font-family: Cambria, Georgia, serif; font-size: 22px; fill: #111111; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1100" />

  <text class="title" x="800" y="56">Deepfake Detection Portal - ER Diagram</text>

  <!-- MEDIA_FILE -->
  <rect class="entity" x="80" y="180" width="300" height="210" rx="8" ry="8" />
  <line class="divider" x1="80" y1="232" x2="380" y2="232" />
  <text class="name" x="230" y="214">MEDIA_FILE</text>
  <text class="attr" x="104" y="266">PK media_id</text>
  <text class="attr" x="104" y="296">original_filename</text>
  <text class="attr" x="104" y="326">stored_filename</text>
  <text class="attr" x="104" y="356">media_type</text>
  <text class="attr" x="104" y="386">upload_relative_path</text>

  <!-- ANALYSIS_REPORT -->
  <rect class="entity" x="570" y="120" width="460" height="320" rx="8" ry="8" />
  <line class="divider" x1="570" y1="172" x2="1030" y2="172" />
  <text class="name" x="800" y="154">ANALYSIS_REPORT</text>
  <text class="attr" x="596" y="206">PK report_id</text>
  <text class="attr" x="596" y="236">FK media_id</text>
  <text class="attr" x="596" y="266">FK model_id</text>
  <text class="attr" x="596" y="296">FK metrics_id</text>
  <text class="attr" x="596" y="326">analyzed_at</text>
  <text class="attr" x="596" y="356">threshold</text>
  <text class="attr" x="596" y="386">verdict</text>
  <text class="attr" x="820" y="206">confidence</text>
  <text class="attr" x="820" y="236">fake_probability</text>
  <text class="attr" x="820" y="266">risk_level</text>
  <text class="attr" x="820" y="296">sampled_frames</text>
  <text class="attr" x="820" y="326">total_frames</text>
  <text class="attr" x="820" y="356">suspicious_ratio</text>

  <!-- MODEL_FILE -->
  <rect class="entity" x="1200" y="120" width="270" height="190" rx="8" ry="8" />
  <line class="divider" x1="1200" y1="172" x2="1470" y2="172" />
  <text class="name" x="1335" y="154">MODEL_FILE</text>
  <text class="attr" x="1224" y="206">PK model_id</text>
  <text class="attr" x="1224" y="236">model_path</text>
  <text class="attr" x="1224" y="266">model_format</text>
  <text class="attr" x="1224" y="296">ready_state</text>

  <!-- METRICS -->
  <rect class="entity" x="1180" y="380" width="310" height="240" rx="8" ry="8" />
  <line class="divider" x1="1180" y1="432" x2="1490" y2="432" />
  <text class="name" x="1335" y="414">METRICS</text>
  <text class="attr" x="1204" y="466">PK metrics_id</text>
  <text class="attr" x="1204" y="496">dataset_name</text>
  <text class="attr" x="1204" y="526">best_threshold</text>
  <text class="attr" x="1204" y="556">accuracy</text>
  <text class="attr" x="1204" y="586">precision</text>
  <text class="attr" x="1350" y="466">recall</text>
  <text class="attr" x="1350" y="496">f1_score</text>
  <text class="attr" x="1350" y="526">auc</text>
  <text class="attr" x="1350" y="556">evaluated_at</text>

  <!-- FRAME_SCORE -->
  <rect class="entity" x="160" y="650" width="340" height="230" rx="8" ry="8" />
  <line class="divider" x1="160" y1="702" x2="500" y2="702" />
  <text class="name" x="330" y="684">FRAME_SCORE</text>
  <text class="attr" x="184" y="736">PK frame_score_id</text>
  <text class="attr" x="184" y="766">FK report_id</text>
  <text class="attr" x="184" y="796">frame_no</text>
  <text class="attr" x="184" y="826">fake_probability</text>
  <text class="attr" x="184" y="856">background_probability</text>
  <text class="attr" x="184" y="886">face_probability</text>

  <!-- KEY_FRAME -->
  <rect class="entity" x="650" y="650" width="360" height="230" rx="8" ry="8" />
  <line class="divider" x1="650" y1="702" x2="1010" y2="702" />
  <text class="name" x="830" y="684">KEY_FRAME</text>
  <text class="attr" x="674" y="736">PK key_frame_id</text>
  <text class="attr" x="674" y="766">FK report_id</text>
  <text class="attr" x="674" y="796">frame_no</text>
  <text class="attr" x="674" y="826">label</text>
  <text class="attr" x="674" y="856">thumbnail_relative_path</text>
  <text class="attr" x="674" y="886">fake_probability</text>

  <!-- Relationships -->
  <line class="line" x1="380" y1="285" x2="570" y2="285" />
  <text class="card" x="408" y="270">1</text>
  <text class="card" x="542" y="270">1</text>
  <text class="rel" x="475" y="312">generates</text>

  <line class="line" x1="1030" y1="220" x2="1200" y2="220" />
  <text class="card" x="1058" y="204">N</text>
  <text class="card" x="1172" y="204">1</text>
  <text class="rel" x="1115" y="246">uses</text>

  <path class="line" d="M 1030 336 L 1110 336 L 1110 500 L 1180 500" />
  <text class="card" x="1052" y="324">N</text>
  <text class="card" x="1158" y="488">1</text>
  <text class="rel" x="1128" y="420">applies</text>

  <path class="line" d="M 720 440 L 720 560 L 330 560 L 330 650" />
  <text class="card" x="704" y="472">1</text>
  <text class="card" x="348" y="634">N</text>
  <text class="rel" x="512" y="548">contains</text>

  <line class="line" x1="830" y1="440" x2="830" y2="650" />
  <text class="card" x="814" y="472">1</text>
  <text class="card" x="814" y="634">N</text>
  <text class="rel" x="930" y="548">highlights</text>

  <text class="caption" x="800" y="1038">Fig.5.3 ER diagram of the Deepfake Detection Portal</text>
</svg>
