<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">Deepfake Detection Portal Block Diagram</title>
  <desc id="desc">Clean report-style block diagram showing the main architecture and outputs of the Deepfake Detection Portal.</desc>
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17446f"/>
      <stop offset="100%" stop-color="#2f6ea8"/>
    </linearGradient>
    <linearGradient id="engine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4a261"/>
      <stop offset="100%" stop-color="#e76f51"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#6f91b5"/>
    </marker>
    <style>
      .page { fill: #f5f8fc; }
      .hero-box { fill: url(#hero); }
      .panel { fill: #ffffff; stroke: #d7e1ec; stroke-width: 2; }
      .panel-soft { fill: #f9fbfe; stroke: #d7e1ec; stroke-width: 2; }
      .engine-box { fill: url(#engine); }
      .title { font-family: Arial, sans-serif; font-size: 50px; font-weight: 700; fill: #ffffff; }
      .subtitle { font-family: Arial, sans-serif; font-size: 24px; fill: #d7e6f4; }
      .section { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #5d768f; letter-spacing: 1px; }
      .block-title { font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #19324c; text-anchor: middle; }
      .block-sub { font-family: Arial, sans-serif; font-size: 19px; fill: #4b657f; text-anchor: middle; }
      .engine-title { font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
      .engine-sub { font-family: Arial, sans-serif; font-size: 19px; fill: #fff0e7; text-anchor: middle; }
      .line { fill: none; stroke: #6f91b5; stroke-width: 4.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .caption { font-family: Cambria, Georgia, serif; font-size: 25px; fill: #1e2c38; text-anchor: middle; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="1080"/>

  <rect class="hero-box" x="48" y="38" width="1504" height="150" rx="28" ry="28"/>
  <text class="title" x="92" y="102">Deepfake Detection Portal</text>
  <text class="subtitle" x="92" y="144">Professional block diagram for engineering report</text>

  <text class="section" x="94" y="252">MAIN PROCESS</text>

  <rect class="panel" x="86" y="320" width="238" height="120" rx="22" ry="22"/>
  <text class="block-title" x="205" y="373">Media Upload</text>
  <text class="block-sub" x="205" y="407">Image or video input</text>

  <rect class="panel" x="390" y="320" width="250" height="120" rx="22" ry="22"/>
  <text class="block-title" x="515" y="373">Validation</text>
  <text class="block-sub" x="515" y="407">Type check and storage</text>

  <rect class="engine-box" x="708" y="294" width="360" height="172" rx="28" ry="28"/>
  <text class="engine-title" x="888" y="352">Detection Engine</text>
  <text class="engine-sub" x="888" y="388">Image scoring</text>
  <text class="engine-sub" x="888" y="416">Face scoring and heuristics</text>
  <text class="engine-sub" x="888" y="444">Video aggregation</text>

  <rect class="panel" x="1136" y="320" width="258" height="120" rx="22" ry="22"/>
  <text class="block-title" x="1265" y="373">Report Builder</text>
  <text class="block-sub" x="1265" y="407">Verdict and report data</text>

  <path class="line" d="M 324 380 L 389 380"/>
  <path class="line" d="M 640 380 L 707 380"/>
  <path class="line" d="M 1068 380 L 1135 380"/>

  <text class="section" x="94" y="558">SUPPORTING INPUTS</text>

  <rect class="panel-soft" x="606" y="626" width="248" height="114" rx="22" ry="22"/>
  <text class="block-title" x="730" y="675">Trained Model</text>
  <text class="block-sub" x="730" y="708">deepfake_model.h5 / .keras</text>

  <rect class="panel-soft" x="920" y="626" width="248" height="114" rx="22" ry="22"/>
  <text class="block-title" x="1044" y="675">Threshold Metrics</text>
  <text class="block-sub" x="1044" y="708">best_threshold and accuracy</text>

  <path class="line" d="M 730 626 L 730 542 L 820 542 L 820 467"/>
  <path class="line" d="M 1044 626 L 1044 542 L 956 542 L 956 467"/>

  <text class="section" x="94" y="812">OUTPUTS</text>

  <rect class="panel-soft" x="1094" y="880" width="248" height="114" rx="22" ry="22"/>
  <text class="block-title" x="1218" y="929">JSON Report</text>
  <text class="block-sub" x="1218" y="962">Saved analysis result</text>

  <rect class="panel-soft" x="1388" y="880" width="164" height="114" rx="22" ry="22"/>
  <text class="block-title" x="1470" y="929">Key Frames</text>
  <text class="block-sub" x="1470" y="962">Chart and media</text>

  <path class="line" d="M 1265 441 L 1265 879"/>
  <path class="line" d="M 1265 820 L 1470 820 L 1470 879"/>

  <rect class="panel" x="512" y="836" width="470" height="158" rx="24" ry="24"/>
  <text class="block-title" x="747" y="900">Final Result Screen</text>
  <text class="block-sub" x="747" y="938">Preview, verdict, confidence,</text>
  <text class="block-sub" x="747" y="966">risk level, chart, and download</text>

  <path class="line" d="M 1265 441 L 1265 760 L 982 760 L 982 915"/>

  <text class="caption" x="800" y="1042">Fig.5.1 Block diagram of the Deepfake Detection Portal</text>
</svg>
