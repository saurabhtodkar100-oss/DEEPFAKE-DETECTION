<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Deepfake Detection Portal Block Diagram</title>
  <desc id="desc">A project-specific block diagram showing the upload, preprocessing, AI detection, reporting, and dashboard flow for the deepfake detection portal.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#25364a" />
    </marker>
    <style>
      .page { fill: #ffffff; }
      .title { font-family: Cambria, Georgia, serif; font-size: 58px; font-weight: 700; fill: #cc1f1f; }
      .subtitle { font-family: Cambria, Georgia, serif; font-size: 42px; font-weight: 700; fill: #0b66c3; }
      .caption { font-family: Cambria, Georgia, serif; font-size: 26px; fill: #111111; }
      .box { fill: #fbfbfd; stroke: #25364a; stroke-width: 2.8; }
      .box-accent { fill: #fffaf5; stroke: #b96b2b; stroke-width: 3; }
      .label { font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #202a35; }
      .sub { font-family: Arial, sans-serif; font-size: 24px; fill: #44505d; }
      .small { font-family: Arial, sans-serif; font-size: 22px; fill: #44505d; }
      .engine-title { font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #202a35; }
      .engine-copy { font-family: Arial, sans-serif; font-size: 24px; fill: #2d3946; }
      .line { fill: none; stroke: #25364a; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .branch { fill: none; stroke: #25364a; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1200" height="1600" />

  <text class="title" x="600" y="105" text-anchor="middle">Deepfake Detection Portal</text>
  <text class="subtitle" x="600" y="180" text-anchor="middle">Block Diagram</text>

  <rect class="box" x="455" y="260" rx="18" ry="18" width="290" height="92" />
  <text class="label" x="600" y="316" text-anchor="middle">Image / Video Upload</text>

  <path class="line" d="M 600 352 L 600 410" />

  <rect class="box" x="470" y="420" rx="18" ry="18" width="260" height="92" />
  <text class="label" x="600" y="476" text-anchor="middle">Validate &amp; Store</text>

  <path class="line" d="M 600 512 L 600 564" />

  <rect class="box" x="445" y="570" rx="18" ry="18" width="310" height="120" />
  <text class="label" x="600" y="620" text-anchor="middle">Preprocess Media</text>
  <text class="small" x="600" y="660" text-anchor="middle">resize, normalize, sample frames</text>

  <path class="line" d="M 600 690 L 600 734" />

  <rect class="box-accent" x="315" y="744" rx="28" ry="28" width="570" height="260" />
  <text class="engine-title" x="600" y="800" text-anchor="middle">AI Detection Engine</text>
  <text class="engine-copy" x="600" y="852" text-anchor="middle">- whole-image scoring</text>
  <text class="engine-copy" x="600" y="892" text-anchor="middle">- face-region scoring</text>
  <text class="engine-copy" x="600" y="932" text-anchor="middle">- heuristic calibration</text>
  <text class="engine-copy" x="600" y="972" text-anchor="middle">- video frame aggregation</text>

  <rect class="box" x="82" y="800" rx="18" ry="18" width="190" height="118" />
  <text class="label" x="177" y="852" text-anchor="middle">Trained Model</text>
  <text class="sub" x="177" y="887" text-anchor="middle">.keras / .h5</text>

  <rect class="box" x="928" y="800" rx="18" ry="18" width="190" height="118" />
  <text class="label" x="1023" y="852" text-anchor="middle">Metrics File</text>
  <text class="sub" x="1023" y="887" text-anchor="middle">best_threshold</text>

  <path class="line" d="M 272 859 L 314 859" />
  <path class="line" d="M 928 859 L 886 859" />

  <path class="line" d="M 600 1004 L 600 1074" />

  <rect class="box" x="435" y="1086" rx="18" ry="18" width="330" height="102" />
  <text class="label" x="600" y="1142" text-anchor="middle">Verdict + Confidence</text>
  <text class="sub" x="600" y="1174" text-anchor="middle">REAL / FAKE decision</text>

  <rect class="box" x="120" y="1228" rx="18" ry="18" width="250" height="108" />
  <text class="label" x="245" y="1285" text-anchor="middle">JSON Report</text>
  <text class="small" x="245" y="1319" text-anchor="middle">reports/&lt;id&gt;.json</text>

  <rect class="box" x="830" y="1228" rx="18" ry="18" width="250" height="108" />
  <text class="label" x="955" y="1285" text-anchor="middle">Key Frames</text>
  <text class="small" x="955" y="1319" text-anchor="middle">chart + thumbnails</text>

  <path class="line" d="M 500 1188 L 370 1276" />
  <path class="line" d="M 700 1188 L 830 1276" />

  <rect class="box-accent" x="360" y="1394" rx="20" ry="20" width="480" height="108" />
  <text class="label" x="600" y="1452" text-anchor="middle">Flask Web Dashboard</text>
  <text class="sub" x="600" y="1486" text-anchor="middle">preview, risk level, result download</text>

  <path class="branch" d="M 245 1336 L 245 1448 L 360 1448" marker-end="url(#arrow)" />
  <path class="branch" d="M 955 1336 L 955 1448 L 840 1448" marker-end="url(#arrow)" />

  <text class="caption" x="600" y="1562" text-anchor="middle">Fig. Block diagram of the Deepfake Detection Portal</text>
</svg>
